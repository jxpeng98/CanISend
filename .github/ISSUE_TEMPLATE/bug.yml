name: Rust-native bug report
description: Report a reproducible native CLI, workflow, privacy, or rendering problem
title: "[native bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        CanISend sends no default telemetry. Do not paste real advert text, profile evidence, application materials,
        workspace contents, provider payloads, credentials, tokens, or private paths. Replace them with synthetic data.
  - type: input
    id: version
    attributes:
      label: CanISend version
      description: Paste only the version value from `canisend version --json`.
      placeholder: 0.7.0-alpha.1
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Release target
      options:
        - aarch64-apple-darwin
        - x86_64-apple-darwin
        - x86_64-unknown-linux-gnu
        - x86_64-unknown-linux-musl
        - x86_64-pc-windows-msvc
        - source build
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Release blocker class
      options:
        - possible data loss or corruption
        - privacy or security boundary
        - protocol or workspace compatibility
        - incorrect evidence attribution
        - rendering failure or corruption
        - other functional problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Sanitized reproduction
      description: Use synthetic inputs and list the shortest exact command sequence.
      placeholder: |
        1. Create a temporary workspace with synthetic data.
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result and stable error code
      description: Include the stable error code, but remove private bodies, paths, URLs, IDs, and provider data.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I replaced all real job, profile, application, workspace, provider, credential, URL, path, and ID data with synthetic values.
          required: true
        - label: I did not attach a workspace, backup, task-input export, application package, token, or credential.
          required: true
