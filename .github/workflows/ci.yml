name: ci

on:
  push:
    branches:
      - main
      - rewrite/rust-native
      - "feat/**"
      - "fix/**"
  pull_request:
  workflow_dispatch:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy,rustfmt

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Reject active Python product files
        shell: bash
        run: |
          tracked="$(git ls-files '*.py' pyproject.toml uv.lock)"
          if [[ -n "$tracked" ]]; then
            echo "Rust-native branch contains forbidden Python product files:" >&2
            echo "$tracked" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Check generated contracts and resources
        run: cargo run -p xtask --locked -- release check

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke native binary
        shell: bash
        run: |
          workspace="$RUNNER_TEMP/canisend-smoke-workspace"
          backup="$RUNNER_TEMP/canisend-smoke-backup"
          restored="$RUNNER_TEMP/canisend-smoke-restored"
          ./target/release/canisend version --json
          ./target/release/canisend doctor --json
          ./target/release/canisend agent capabilities --json
          ./target/release/canisend --workspace "$workspace" workspace init --json
          ./target/release/canisend --workspace "$workspace" workspace status --json
          ./target/release/canisend --workspace "$workspace" workspace check --json
          job_id="$(./target/release/canisend --workspace "$workspace" job create --title "Lecturer in Economics" --institution "University X" --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          ./target/release/canisend --workspace "$workspace" job import "$job_id" --file fixtures/v2-spec/job-advert.md --json
          ./target/release/canisend --workspace "$workspace" job show "$job_id" --json
          ./target/release/canisend discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --dry-run --json
          ./target/release/canisend --workspace "$workspace" discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --json
          lead_id="$(./target/release/canisend --workspace "$workspace" discovery list --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          ./target/release/canisend --workspace "$workspace" discovery promote "$lead_id" --json
          ./target/release/canisend --workspace "$workspace" workspace backup "$backup" --json
          ./target/release/canisend workspace restore "$backup" "$restored" --json
          ./target/release/canisend --workspace "$restored" workspace check --json
