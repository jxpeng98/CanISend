name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Check canonical skill compatibility mirror
        run: uv run python scripts/sync_workspace_skill_mirror.py --check

      - name: Run tests
        run: uv run python -m pytest -v

  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Smoke test CLI contract
        run: uv run python scripts/smoke_decision_spine.py --canisend canisend --workspace .ci-smoke-stage2

      - name: Smoke test Stage 4 discovery contract
        run: uv run python scripts/smoke_discovery.py --canisend canisend --workspace .ci-smoke-discovery

  build-package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Build distributions
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Check packaged resources
        run: uv run python -m canisend.package_check dist/*.whl

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/canisend-smoke
          /tmp/canisend-smoke/bin/pip install dist/*.whl
          /tmp/canisend-smoke/bin/python scripts/smoke_decision_spine.py \
            --canisend /tmp/canisend-smoke/bin/canisend \
            --workspace /tmp/canisend-stage2-example
          /tmp/canisend-smoke/bin/python scripts/smoke_discovery.py \
            --canisend /tmp/canisend-smoke/bin/canisend \
            --workspace /tmp/canisend-stage4-discovery
