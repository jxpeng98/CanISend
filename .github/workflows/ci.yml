name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "perf/**"
  pull_request:
  workflow_dispatch:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Check canonical skill compatibility mirror
        run: uv run python scripts/sync_workspace_skill_mirror.py --check

      - name: Run fast contract gate
        run: uv run python -m pytest -q -m fast

  full:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Check canonical skill compatibility mirror
        run: uv run python scripts/sync_workspace_skill_mirror.py --check

      - name: Run complete suite
        run: uv run python -m pytest -q -n 2

  build-package:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Build distributions
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Check packaged resources
        run: uv run python -m canisend.package_check dist/*.whl

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/canisend-smoke
          /tmp/canisend-smoke/bin/pip install dist/*.whl
          /tmp/canisend-smoke/bin/python scripts/smoke_decision_spine.py \
            --canisend /tmp/canisend-smoke/bin/canisend \
            --workspace /tmp/canisend-stage5-example
          /tmp/canisend-smoke/bin/python scripts/smoke_discovery.py \
            --canisend /tmp/canisend-smoke/bin/canisend \
            --workspace /tmp/canisend-stage4-discovery
