name: ci

on:
  push:
    branches:
      - main
      - rewrite/rust-native
      - "feat/**"
      - "fix/**"
  pull_request:
  workflow_dispatch:

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check advisories, licenses, and dependency sources
        uses: EmbarkStudios/cargo-deny-action@v2.0.18
        with:
          command: check advisories licenses sources

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy,rustfmt

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Reject active Python product files
        shell: bash
        run: |
          tracked="$(git ls-files '*.py' pyproject.toml uv.lock)"
          if [[ -n "$tracked" ]]; then
            echo "Rust-native branch contains forbidden Python product files:" >&2
            echo "$tracked" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Run generated property contracts
        run: cargo test -p canisend-contracts --locked --test property_contract

      - name: Check generated contracts and resources
        run: cargo run -p xtask --locked -- release check

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke native binary
        shell: bash
        run: |
          workspace="$RUNNER_TEMP/canisend-smoke-workspace"
          backup="$RUNNER_TEMP/canisend-smoke-backup"
          restored="$RUNNER_TEMP/canisend-smoke-restored"
          ./target/release/canisend version --json
          ./target/release/canisend doctor --json
          ./target/release/canisend agent capabilities --json
          ./target/release/canisend --workspace "$workspace" workspace init --json
          ./target/release/canisend --workspace "$workspace" workspace status --json
          ./target/release/canisend --workspace "$workspace" workspace check --json
          job_id="$(./target/release/canisend --workspace "$workspace" job create --title "Lecturer in Economics" --institution "University X" --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          ./target/release/canisend --workspace "$workspace" job import "$job_id" --file fixtures/v2-spec/job-advert.md --json
          ./target/release/canisend --workspace "$workspace" job show "$job_id" --json
          ./target/release/canisend discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --dry-run --json
          ./target/release/canisend --workspace "$workspace" discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --json
          lead_id="$(./target/release/canisend --workspace "$workspace" discovery list --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          ./target/release/canisend --workspace "$workspace" discovery promote "$lead_id" --json
          ./target/release/canisend --workspace "$workspace" workspace backup "$backup" --json
          ./target/release/canisend workspace restore "$backup" "$restored" --json
          ./target/release/canisend --workspace "$restored" workspace check --json
          ./scripts/smoke_host_agent.sh ./target/release/canisend "$RUNNER_TEMP/canisend-host-agent-smoke"

  recovery-native:
    name: recovery-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: macos-arm64
            os: macos-14
          - name: windows-x86_64
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Exercise interruption, restore, corruption, and concurrency contracts
        run: cargo test -p canisend-store --locked recovery_

  render-native:
    name: render-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: target/release/canisend
          - name: macos-arm64
            os: macos-14
            binary: target/release/canisend
          - name: windows-x86_64
            os: windows-latest
            binary: target/release/canisend.exe
    steps:
      - uses: actions/checkout@v7

      - name: Parse Windows release signing verifier
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path -LiteralPath scripts/verify_windows_authenticode.ps1),
            [ref]$tokens,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Test embedded fonts and complex layout
        run: cargo test -p canisend-io render::tests --locked

      - name: Test the full revision-bound package render
        run: >-
          cargo test -p canisend-store --locked --test store_contract
          evidence_and_match_tasks_enforce_stable_revision_bound_identities
          -- --exact

      - name: Build release render probe
        run: cargo build --release --locked -p canisend-cli

      - name: Check release performance budgets
        if: matrix.name == 'linux-x86_64'
        env:
          CANISEND_PERFORMANCE_OUTPUT: ${{ runner.temp }}/canisend-performance.json
        run: >-
          cargo test --release -p canisend-cli --locked
          --test performance_contract -- --ignored --nocapture

      - name: Check full synthetic workflow budget
        if: matrix.name == 'linux-x86_64'
        env:
          CANISEND_PERFORMANCE_GATE: "1"
        run: >-
          cargo test --release -p canisend-store --locked --test store_contract
          evidence_and_match_tasks_enforce_stable_revision_bound_identities
          -- --exact --nocapture

      - name: Verify release probe and size budget
        shell: bash
        run: |
          binary="${{ matrix.binary }}"
          doctor_json="$("$binary" doctor --json)"
          echo "$doctor_json"
          grep -q '"page_count":2' <<<"$doctor_json"
          grep -q '"warning_count":0' <<<"$doctor_json"
          binary_bytes="$(wc -c <"$binary" | tr -d ' ')"
          test "$binary_bytes" -le 67108864
          echo "### ${{ matrix.name }} render acceptance" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "- Binary bytes: $binary_bytes" >>"$GITHUB_STEP_SUMMARY"
          echo "- Doctor: \`$doctor_json\`" >>"$GITHUB_STEP_SUMMARY"

      - name: Stage binary with renderer notices
        shell: bash
        run: |
          ./scripts/stage_native_bundle.sh "${{ matrix.binary }}" \
            "$RUNNER_TEMP/canisend-${{ matrix.name }}"
          if [[ -f "$RUNNER_TEMP/canisend-performance.json" ]]; then
            cp "$RUNNER_TEMP/canisend-performance.json" \
              "$RUNNER_TEMP/canisend-${{ matrix.name }}/PERFORMANCE.json"
          fi

      - name: Smoke documented workflow from the staged bundle
        shell: bash
        run: |
          staged_binary="$RUNNER_TEMP/canisend-${{ matrix.name }}/$(basename "${{ matrix.binary }}")"
          ./scripts/smoke_documented_quickstart.sh "$staged_binary" \
            "$RUNNER_TEMP/canisend-documentation-${{ matrix.name }}"

      - name: Upload native render evidence
        uses: actions/upload-artifact@v7
        with:
          name: canisend-render-${{ matrix.name }}
          path: ${{ runner.temp }}/canisend-${{ matrix.name }}
          if-no-files-found: error
