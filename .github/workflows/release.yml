name: native-release-preview

on:
  push:
    tags:
      - "v0.7.*"
  workflow_dispatch:

jobs:
  build-native-preview:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: target/release/canisend
          - name: macos-native
            os: macos-14
            binary: target/release/canisend
          - name: windows-x86_64
            os: windows-latest
            binary: target/release/canisend.exe
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Test native workspace
        run: cargo test --workspace --locked

      - name: Build native preview
        run: cargo build --release --locked

      - name: Check release performance budgets
        if: matrix.name == 'linux-x86_64'
        env:
          CANISEND_PERFORMANCE_OUTPUT: ${{ runner.temp }}/canisend-performance.json
        run: >-
          cargo test --release -p canisend-cli --locked
          --test performance_contract -- --ignored --nocapture

      - name: Check full synthetic workflow budget
        if: matrix.name == 'linux-x86_64'
        env:
          CANISEND_PERFORMANCE_GATE: "1"
        run: >-
          cargo test --release -p canisend-store --locked --test store_contract
          evidence_and_match_tasks_enforce_stable_revision_bound_identities
          -- --exact --nocapture

      - name: Smoke native preview
        shell: bash
        run: |
          binary="${{ matrix.binary }}"
          workspace="$RUNNER_TEMP/canisend-smoke-workspace"
          backup="$RUNNER_TEMP/canisend-smoke-backup"
          restored="$RUNNER_TEMP/canisend-smoke-restored"
          "$binary" version --json
          "$binary" doctor --json
          "$binary" agent capabilities --json
          "$binary" --workspace "$workspace" workspace init --json
          "$binary" --workspace "$workspace" workspace status --json
          "$binary" --workspace "$workspace" workspace check --json
          job_id="$("$binary" --workspace "$workspace" job create --title "Lecturer in Economics" --institution "University X" --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          "$binary" --workspace "$workspace" job import "$job_id" --file fixtures/v2-spec/job-advert.md --json
          "$binary" --workspace "$workspace" job show "$job_id" --json
          "$binary" discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --dry-run --json
          "$binary" --workspace "$workspace" discovery import --file fixtures/v2-spec/discovery/leads.csv --source-name "Release fixture" --json
          lead_id="$("$binary" --workspace "$workspace" discovery list --json | sed -E 's/.*"id":"([^"]+)".*/\1/')"
          "$binary" --workspace "$workspace" discovery promote "$lead_id" --json
          "$binary" --workspace "$workspace" workspace backup "$backup" --json
          "$binary" workspace restore "$backup" "$restored" --json
          "$binary" --workspace "$restored" workspace check --json
          ./scripts/smoke_host_agent.sh "$binary" "$RUNNER_TEMP/canisend-host-agent-smoke"

      - name: Stage unsigned preview bundle with notices
        shell: bash
        run: |
          ./scripts/stage_native_bundle.sh "${{ matrix.binary }}" \
            "$RUNNER_TEMP/canisend-${{ matrix.name }}"
          if [[ -f "$RUNNER_TEMP/canisend-performance.json" ]]; then
            cp "$RUNNER_TEMP/canisend-performance.json" \
              "$RUNNER_TEMP/canisend-${{ matrix.name }}/PERFORMANCE.json"
          fi

      - name: Smoke documented workflow from the staged bundle
        shell: bash
        run: |
          staged_binary="$RUNNER_TEMP/canisend-${{ matrix.name }}/$(basename "${{ matrix.binary }}")"
          ./scripts/smoke_documented_quickstart.sh "$staged_binary" \
            "$RUNNER_TEMP/canisend-documentation-${{ matrix.name }}"

      - name: Upload unsigned preview bundle
        uses: actions/upload-artifact@v7
        with:
          name: canisend-${{ matrix.name }}
          path: ${{ runner.temp }}/canisend-${{ matrix.name }}
          if-no-files-found: error

  publication-disabled:
    runs-on: ubuntu-latest
    needs: build-native-preview
    steps:
      - name: Record preview boundary
        run: echo "Native binaries were verified as CI artifacts; public release publication remains disabled until R11."
