name: release

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Manual publish target. Manual dispatch is for TestPyPI dry runs."
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -v

      - name: Build distributions
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Check packaged resources
        run: uv run python -m academic_prep.package_check dist/*.whl

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/aap-smoke
          /tmp/aap-smoke/bin/pip install dist/*.whl
          /tmp/aap-smoke/bin/academic-prep --help
          /tmp/aap-smoke/bin/academic-prep init-workspace --workspace /tmp/aap-workspace
          /tmp/aap-smoke/bin/academic-prep doctor --workspace /tmp/aap-workspace

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/academic-application-prep
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/academic-application-prep
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
