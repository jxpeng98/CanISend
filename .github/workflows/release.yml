name: native-release-preview

on:
  push:
    tags:
      - "v0.7.*"
  workflow_dispatch:

jobs:
  build-native-preview:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: target/release/canisend
          - name: macos-native
            os: macos-14
            binary: target/release/canisend
          - name: windows-x86_64
            os: windows-latest
            binary: target/release/canisend.exe
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Test native workspace
        run: cargo test --workspace --locked

      - name: Build native preview
        run: cargo build --release --locked

      - name: Smoke native preview
        shell: bash
        run: |
          binary="${{ matrix.binary }}"
          "$binary" version --json
          "$binary" doctor --json
          "$binary" agent capabilities --json

      - name: Upload unsigned preview binary
        uses: actions/upload-artifact@v7
        with:
          name: canisend-${{ matrix.name }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  publication-disabled:
    runs-on: ubuntu-latest
    needs: build-native-preview
    steps:
      - name: Record preview boundary
        run: echo "Native binaries were verified as CI artifacts; public release publication remains disabled until R11."
