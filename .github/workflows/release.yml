name: native-release

on:
  push:
    tags:
      - "v0.7.0*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Exact workspace tag to validate without publishing"
        required: true
        default: "v0.7.0-alpha.1"

permissions:
  contents: read

jobs:
  release-identity:
    name: release-identity
    runs-on: ubuntu-24.04
    outputs:
      commit: ${{ steps.identity.outputs.commit }}
      publish: ${{ steps.identity.outputs.publish }}
      stage: ${{ steps.identity.outputs.stage }}
      tag: ${{ steps.identity.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Resolve and validate release identity
        id: identity
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="$GITHUB_REF_NAME"
            publish="true"
          else
            tag="${{ inputs.tag }}"
            publish="false"
          fi
          cargo run -p xtask --locked -- release validate-tag "$tag"
          version="${tag#v}"
          if [[ "$version" == *-alpha.* ]]; then
            stage="alpha"
          elif [[ "$version" == *-beta.* ]]; then
            stage="beta"
          elif [[ "$version" == *-rc.* ]]; then
            stage="rc"
          else
            stage="stable"
          fi
          {
            echo "commit=$GITHUB_SHA"
            echo "publish=$publish"
            echo "stage=$stage"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  source-gates:
    name: source-gates
    needs: release-identity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Reject active Python product files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)(pyproject\.toml|uv\.lock|requirements[^/]*\.txt|pytest\.ini|[^/]+\.py)$'; then
            echo "active Python product files are not allowed in the Rust-native release" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run complete Rust suite
        run: cargo test --workspace --locked

      - name: Check release contracts, schemas, resources, and documentation
        run: cargo run -p xtask --locked -- release check

      - name: Check dependency advisories, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18

  build-native-archives:
    name: build-${{ matrix.target }}
    needs:
      - release-identity
      - source-gates
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            binary: target/aarch64-apple-darwin/release/canisend
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: target/x86_64-apple-darwin/release/canisend
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: target/x86_64-unknown-linux-gnu/release/canisend
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            binary: target/x86_64-unknown-linux-musl/release/canisend
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            binary: target/x86_64-pc-windows-msvc/release/canisend.exe
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install pinned Rust target
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Test target workspace
        run: cargo test --workspace --locked --target ${{ matrix.target }}

      - name: Build native release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p canisend-cli

      - name: Check release performance budgets
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          CANISEND_PERFORMANCE_OUTPUT: ${{ runner.temp }}/canisend-performance.json
        run: >-
          cargo test --release -p canisend-cli --locked
          --target x86_64-unknown-linux-gnu
          --test performance_contract -- --ignored --nocapture

      - name: Check full synthetic workflow budget
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          CANISEND_PERFORMANCE_GATE: "1"
        run: >-
          cargo test --release -p canisend-store --locked
          --target x86_64-unknown-linux-gnu --test store_contract
          evidence_and_match_tasks_enforce_stable_revision_bound_identities
          -- --exact --nocapture

      - name: Enforce signing stage boundary
        if: needs.release-identity.outputs.stage != 'alpha'
        shell: bash
        run: |
          echo "beta, rc, and stable require the platform signing jobs introduced by R11.2" >&2
          exit 1

      - name: Create platform archive with notices
        shell: bash
        run: |
          ./scripts/package_native_release.sh \
            "${{ matrix.binary }}" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/release-package"

      - name: Smoke exact extracted release archive
        shell: bash
        run: |
          version="${{ needs.release-identity.outputs.tag }}"
          version="${version#v}"
          archive="$RUNNER_TEMP/release-package/canisend-$version-${{ matrix.target }}.${{ matrix.archive }}"
          ./scripts/smoke_release_archive.sh \
            "$archive" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/release-smoke-${{ matrix.target }}"

      - name: Upload verified platform archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-${{ matrix.target }}
          path: ${{ runner.temp }}/release-package/canisend-*.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14

  assemble-release:
    name: assemble-and-attest-release
    needs:
      - release-identity
      - build-native-archives
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Download verified platform archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archive-*
          path: ${{ runner.temp }}/native-archives

      - name: Assemble SBOM, release manifest, and SHA256SUMS
        shell: bash
        run: |
          cargo run -p xtask --locked -- release assemble \
            "${{ needs.release-identity.outputs.tag }}" \
            "${{ needs.release-identity.outputs.commit }}" \
            "$RUNNER_TEMP/native-archives" \
            "$RUNNER_TEMP/release-assets"
          cargo run -p xtask --locked -- release verify \
            "${{ needs.release-identity.outputs.tag }}" \
            "$RUNNER_TEMP/release-assets"

      - name: Attest archives, SBOM, checksums, and release manifest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release-assets/*

      - name: Upload complete release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canisend-${{ needs.release-identity.outputs.tag }}-release-assets
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error
          retention-days: 30

      - name: Create draft GitHub release and publish verified assets
        if: needs.release-identity.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_STAGE: ${{ needs.release-identity.outputs.stage }}
          RELEASE_TAG: ${{ needs.release-identity.outputs.tag }}
        shell: bash
        run: |
          release_directory="$RUNNER_TEMP/release-assets"
          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "CanISend ${RELEASE_TAG#v}" \
            --notes-file "$release_directory/RELEASE_NOTES.md"
          gh release upload "$RELEASE_TAG" "$release_directory"/*
          if [[ "$RELEASE_STAGE" == "stable" ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --latest
          else
            gh release edit "$RELEASE_TAG" --draft=false --prerelease
          fi
