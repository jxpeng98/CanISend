name: rust-r0-spikes

on:
  push:
    branches:
      - rewrite/rust-native
  workflow_dispatch:

jobs:
  dependency-spikes:
    name: dependency-spikes-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: spikes/r0-dependencies

      - name: Check spike formatting
        run: cargo fmt --manifest-path spikes/r0-dependencies/Cargo.toml --all -- --check

      - name: Prove bundled native dependencies
        run: >-
          cargo run --manifest-path spikes/r0-dependencies/Cargo.toml
          -p canisend-r0-native-probe --locked

      - name: Prove Rustls HTTPS
        env:
          CANISEND_R0_NETWORK_GET: "1"
        run: >-
          cargo run --manifest-path spikes/r0-dependencies/Cargo.toml
          -p canisend-r0-network-probe --locked
